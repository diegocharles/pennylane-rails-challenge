# fly.toml app configuration file generated for pennylane-test on 2023-08-30T15:58:37+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "pennylane-test"
primary_region = "mad"
console_command = "/rails/bin/rails console"
privileged_eBPF = false

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[statics]]
  guest_path = "/rails/public"
  url_prefix = "/"
